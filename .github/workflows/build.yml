name: Build Worm WinForms

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore WormWinForms.sln
      
    - name: Build
      run: dotnet build WormWinForms.sln --configuration Release --no-restore
      
    - name: Test
      run: dotnet test WormWinForms.sln --configuration Release --no-build --verbosity normal